name: Purge Cloudflare Cache

on:
    workflow_call:
        inputs:
            IS_IOTALABS:
                description: 'Purge IOTALABS Cloudflare Cache'
                type: boolean
                required: false
                default: false
            IS_IOTA_NETWORK:
                description: 'Purge IOTA Network Cloudflare Cache'
                type: boolean
                required: false
                default: false
            IS_IOTA_FOUNDATION:
                description: 'Purge IOTA Foundation Cloudflare Cache'
                type: boolean
                required: false
                default: false
        secrets:
            CLOUDFLARE_IOTALABS_ZONE_ID:
                description: 'Cloudflare Zone ID for IOTALABS'
                required: false
            CLOUDFLARE_NETWORK_ZONE_ID:
                description: 'Cloudflare Zone ID for IOTA Network'
                required: false
            CLOUDFLARE_FOUNDATION_ZONE_ID:
                description: 'Cloudflare Zone ID for IOTA Foundation'
                required: false
            CLOUDFLARE_CACHE_API_TOKEN:
                description: 'Cloudflare API Token for Cache Purge'
                required: false

    workflow_dispatch:
        inputs:
            IS_IOTALABS:
                description: 'Purge IOTALABS Cloudflare Cache'
                required: false
                type: boolean
                default: false
            IS_IOTA_NETWORK:
                description: 'Purge IOTA Network Cloudflare Cache'
                type: boolean
                required: false
                default: false
            IS_IOTA_FOUNDATION:
                description: 'Purge IOTA Foundation Cloudflare Cache'
                type: boolean
                required: false
                default: false

jobs:
    purge-iotalabs-cloudflare-cache:
        runs-on: ubuntu-latest
        if: inputs.IS_IOTALABS
        steps:
            - name: Purge Cloudflare Cache
              uses: nathanvaughn/actions-cloudflare-purge@e893da8393033106c170b0b9de0918112cf04800 # pin@v4.0.0
              with:
                  cf_zone: ${{ secrets.CLOUDFLARE_IOTALABS_ZONE_ID }}
                  cf_auth: ${{ secrets.CLOUDFLARE_CACHE_API_TOKEN }}
                  hosts: iotalabs.io
    purge-iota-network-cloudflare-cache:
        runs-on: ubuntu-latest
        if: inputs.IS_IOTA_NETWORK
        steps:
            - name: Purge Cloudflare Cache
              uses: nathanvaughn/actions-cloudflare-purge@e893da8393033106c170b0b9de0918112cf04800 # pin@v4.0.0
              with:
                  cf_zone: ${{ secrets.CLOUDFLARE_NETWORK_ZONE_ID }}
                  cf_auth: ${{ secrets.CLOUDFLARE_CACHE_API_TOKEN }}
                  hosts: www.iota.org
    purge-iota-foundation-cloudflare-cache:
        runs-on: ubuntu-latest
        if: inputs.IS_IOTA_FOUNDATION
        steps:
            - name: Purge Cloudflare Cache
              uses: nathanvaughn/actions-cloudflare-purge@e893da8393033106c170b0b9de0918112cf04800 # pin@v4.0.0
              with:
                  cf_zone: ${{ secrets.CLOUDFLARE_FOUNDATION_ZONE_ID }}
                  cf_auth: ${{ secrets.CLOUDFLARE_CACHE_API_TOKEN }}
                  hosts: iota-foundation.org
