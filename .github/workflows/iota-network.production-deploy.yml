name: Production Deploy for the IOTA Network website

on:
    push:
        branches:
            - main
    workflow_dispatch:

jobs:
    deploy-production:
        uses: ./.github/workflows/monorepo-app-vercel-deploy.yml
        with:
            PRODUCTION: true
            APP_NAME: IOTA Network
            PACKAGE: iota-network
        secrets:
            VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
            VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
            VERCEL_PROJECT_ID: ${{ secrets.IOTA_NETWORK_VERCEL_PROJECT_ID }}
            VERCEL_SCOPE: ${{ secrets.VERCEL_SCOPE }}

    purge-iota-network-cloudflare-cache:
        needs: [deploy-production]
        if: needs.deploy-production.result == 'success'
        uses: ./.github/workflows/purge-cloudfare-cache.yml
        with:
            IS_IOTA_NETWORK: true
        secrets:
            CLOUDFLARE_NETWORK_ZONE_ID: ${{ secrets.CLOUDFLARE_NETWORK_ZONE_ID }}
            CLOUDFLARE_CACHE_API_TOKEN: ${{ secrets.CLOUDFLARE_CACHE_API_TOKEN }}
