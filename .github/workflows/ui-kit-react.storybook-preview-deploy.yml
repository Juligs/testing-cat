name: Preview Deploy for the React UI Kit Storybook

on:
    workflow_dispatch:
    pull_request:
        types: [opened, synchronize, reopened, ready_for_review]
        paths:
            - 'ui-kit/react/**'
            - '.github/workflows/ui-kit-react.storybook-preview-deploy.yml'
            - '.github/workflows/monorepo-app-vercel-deploy.yml'

jobs:
    deploy-preview:
        uses: ./.github/workflows/monorepo-app-vercel-deploy.yml
        with:
            PRODUCTION: false
        secrets:
            VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
            VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
            VERCEL_PROJECT_ID: ${{ secrets.REACT_UI_KIT_VERCEL_PROJECT_ID }}
            VERCEL_SCOPE: ${{ secrets.VERCEL_SCOPE }}
