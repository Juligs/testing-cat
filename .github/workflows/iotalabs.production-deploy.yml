name: Production Deploy for the IOTALABS website

on:
    push:
        branches:
            - main
    workflow_dispatch:

jobs:
    detect:
        runs-on: ubuntu-latest
        outputs:
            packages: ${{ steps.detect.outputs.packages }}
        steps:
            - name: Detect changes
              id: detect
              uses: ./.github/actions/detect-changes

    deploy-production:
        needs: [detect]
        if: "contains(fromJson(needs.detect.outputs.packages), 'iotalabs')"
        uses: ./.github/workflows/monorepo-app-vercel-deploy.yml
        with:
            PRODUCTION: true
            APP_NAME: IOTALABS
        secrets:
            VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
            VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
            VERCEL_PROJECT_ID: ${{ secrets.IOTALABS_VERCEL_PROJECT_ID }}
            VERCEL_SCOPE: ${{ secrets.VERCEL_SCOPE }}

    purge-iotalabs-cloudflare-cache:
        needs: [deploy-production]
        if: needs.deploy-production.result == 'success'
        uses: ./.github/workflows/purge-cloudfare-cache.yml
        with:
            IS_IOTALABS: true
        secrets:
            CLOUDFLARE_IOTALABS_ZONE_ID: ${{ secrets.CLOUDFLARE_IOTALABS_ZONE_ID }}
            CLOUDFLARE_CACHE_API_TOKEN: ${{ secrets.CLOUDFLARE_CACHE_API_TOKEN }}
