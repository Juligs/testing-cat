name: Production Deploy for the IOTALABS website

on:
    push:
        branches:
            - main
    workflow_dispatch:

jobs:
    detect:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        outputs:
            affected: ${{ steps.affected.outputs.result }}
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # pin@v4.3.1
              with:
                  filter: blob:none
                  fetch-depth: 0

            - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # pin@v4.0.0

            - uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # pin@v4.0.2
              with:
                  node-version: '20'
                  cache: 'pnpm'

            - name: Detect if app is affected
              id: affected
              env:
                  EVENT_NAME: ${{ github.event_name }}
                  BEFORE_SHA: ${{ github.event.before }}
              run: |
                  if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
                    echo "result=true" >> "$GITHUB_OUTPUT"
                  else
                    RESULT=$(pnpm dlx turbo@2.9.6 query affected \
                      --base "$BEFORE_SHA" \
                      --head "${{ github.sha }}" \
                      --packages iotalabs \
                    | jq '[.data.affectedPackages.items[].name] | length > 0')
                    echo "result=$RESULT" >> "$GITHUB_OUTPUT"
                  fi

    deploy-production:
        needs: detect
        if: needs.detect.outputs.affected == 'true'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            deployments: write
        concurrency:
            group: ${{ github.workflow }}-IOTALABS-${{ github.ref }}
            cancel-in-progress: false
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # pin@v4.3.1
            - uses: ./.github/actions/monorepo-app-vercel-deploy
              with:
                  production: 'true'
                  app_name: IOTALABS
                  vercel_token: ${{ secrets.VERCEL_TOKEN }}
                  vercel_org_id: ${{ secrets.VERCEL_ORG_ID }}
                  vercel_project_id: ${{ secrets.IOTALABS_VERCEL_PROJECT_ID }}
                  vercel_scope: ${{ secrets.VERCEL_SCOPE }}

    purge-iotalabs-cloudflare-cache:
        needs: [deploy-production]
        uses: ./.github/workflows/purge-cloudfare-cache.yml
        with:
            IS_IOTALABS: true
        secrets:
            CLOUDFLARE_IOTALABS_ZONE_ID: ${{ secrets.CLOUDFLARE_IOTALABS_ZONE_ID }}
            CLOUDFLARE_CACHE_API_TOKEN: ${{ secrets.CLOUDFLARE_CACHE_API_TOKEN }}
