name: Production Deploy for the IOTALABS website

on:
    push:
        branches:
            - main
        paths:
            - 'apps/iotalabs/**'
            - 'ui-kit/react/**'
            - 'shared/**'
            - '.github/workflows/iotalabs.production-deploy.yml'
            - '.github/actions/monorepo-app-vercel-deploy/**'
    workflow_dispatch:

jobs:
    deploy-production:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
            deployments: write
        concurrency:
            group: ${{ github.workflow }}-IOTALABS-${{ github.ref }}
            cancel-in-progress: false
        steps:
            - uses: ./.github/actions/monorepo-app-vercel-deploy
              with:
                  production: 'true'
                  app_name: IOTALABS
                  vercel_token: ${{ secrets.VERCEL_TOKEN }}
                  vercel_org_id: ${{ secrets.VERCEL_ORG_ID }}
                  vercel_project_id: ${{ secrets.IOTALABS_VERCEL_PROJECT_ID }}
                  vercel_scope: ${{ secrets.VERCEL_SCOPE }}

    purge-iotalabs-cloudflare-cache:
        needs: [deploy-production]
        uses: ./.github/workflows/purge-cloudfare-cache.yml
        with:
            IS_IOTALABS: true
        secrets:
            CLOUDFLARE_IOTALABS_ZONE_ID: ${{ secrets.CLOUDFLARE_IOTALABS_ZONE_ID }}
            CLOUDFLARE_CACHE_API_TOKEN: ${{ secrets.CLOUDFLARE_CACHE_API_TOKEN }}
