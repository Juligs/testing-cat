name: Monorepo App Vercel Deploy

on:
    workflow_call:
        inputs:
            APP_NAME:
                description: 'App identifier: iotalabs | iota-network | iota-foundation | react-ui-kit'
                type: string
                required: true
            PRODUCTION:
                type: boolean
                required: true

concurrency:
    group: ${{ github.workflow }}-${{ inputs.APP_NAME }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: ${{ inputs.PRODUCTION != true }}

jobs:
    deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
            deployments: write
        steps:
            - name: Deploy ${{ inputs.APP_NAME }}
              run: echo "Deploy ${{ inputs.APP_NAME }} (${{ inputs.PRODUCTION && 'production' || 'preview' }})"
