name: Monorepo App Vercel Deploy

on:
    workflow_call:
        inputs:
            PRODUCTION:
                type: boolean
                required: true
            APP_NAME:
                type: string
                required: true
            PACKAGE:
                type: string
                required: true

concurrency:
    group: ${{ github.workflow }}-${{ inputs.APP_NAME }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: ${{ inputs.PRODUCTION != true }}

jobs:
    check:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        outputs:
            affected: ${{ steps.affected.outputs.result }}
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # pin@v4.3.1
              with:
                  filter: blob:none
                  fetch-depth: 0

            - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # pin@v4.0.0

            - uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # pin@v4.0.2
              with:
                  node-version: '20'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Check if package is affected
              id: affected
              shell: bash
              env:
                  PACKAGE: ${{ inputs.PACKAGE }}
                  EVENT_NAME: ${{ github.event_name }}
              run: |
                  if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
                      echo "Manual trigger — marking ${PACKAGE} as affected."
                      echo "result=true" >> $GITHUB_OUTPUT
                      exit 0
                  fi

                  affected=$(pnpm exec turbo query affected --packages "${PACKAGE}")
                  count=$(echo "$affected" | jq '.data.affectedPackages.length')

                  if [ "$count" -gt 0 ]; then
                      echo "result=true" >> $GITHUB_OUTPUT
                  else
                      echo "result=false" >> $GITHUB_OUTPUT
                  fi

    deploy:
        needs: check
        if: needs.check.outputs.affected == 'true'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
            deployments: write
        steps:
            - name: Deploy
              run: echo "Deploy ${{ inputs.APP_NAME }} (${{ inputs.PRODUCTION && 'production' || 'preview' }})"
