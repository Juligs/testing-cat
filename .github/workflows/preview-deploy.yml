name: Preview Deploy

on:
    workflow_dispatch:
        inputs:
            app:
                description: 'App to deploy'
                required: true
                default: all
                type: choice
                options:
                    - all
                    - iotalabs
                    - iota-network
                    - iota-foundation
                    - react-ui-kit
    pull_request:
        types: [opened, synchronize, reopened, ready_for_review]

jobs:
    detect:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        outputs:
            affected: ${{ steps.affected.outputs.apps }}
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # pin@v4.3.1
              with:
                  filter: blob:none
                  fetch-depth: 0

            - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # pin@v4.0.0

            - uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # pin@v4.0.2
              with:
                  node-version: '20'
                  cache: 'pnpm'

            - name: Detect affected apps
              id: affected
              env:
                  EVENT_NAME: ${{ github.event_name }}
                  DISPATCH_APP: ${{ inputs.app }}
              run: |
                  APPS='["iotalabs","iota-network","iota-foundation","react-ui-kit"]'

                  if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
                    if [ "${DISPATCH_APP}" = "all" ]; then
                        apps=$APPS
                    else
                        apps=$(echo "$APPS" | jq -c --arg app "$DISPATCH_APP" '[.[] | select(. == $app)]')
                    fi
                  else
                    affected=$(pnpm dlx turbo@2.9.6 query affected --packages $(echo "$APPS" | jq -r '.[]' | xargs))
                    apps=$(echo "$affected" | jq -c '[.data.affectedPackages.items[].name]')
                  fi

                  echo "Affected apps: $apps"
                  echo "apps=$apps" >> $GITHUB_OUTPUT

    deploy-iotalabs:
        needs: detect
        runs-on: ubuntu-latest
        if: contains(fromJSON(needs.detect.outputs.affected), 'iotalabs')
        steps:
            - name: Deploy iotalabs (preview)
              run: echo "Deploying iotalabs (preview)"

    deploy-iota-network:
        needs: detect
        runs-on: ubuntu-latest
        if: contains(fromJSON(needs.detect.outputs.affected), 'iota-network')
        steps:
            - name: Deploy iota-network (preview)
              run: echo "Deploying iota-network (preview)"

    deploy-iota-foundation:
        needs: detect
        runs-on: ubuntu-latest
        if: contains(fromJSON(needs.detect.outputs.affected), 'iota-foundation')
        steps:
            - name: Deploy iota-foundation (preview)
              run: echo "Deploying iota-foundation (preview)"

    deploy-react-ui-kit:
        needs: detect
        runs-on: ubuntu-latest
        if: contains(fromJSON(needs.detect.outputs.affected), 'react-ui-kit')
        steps:
            - name: Deploy react-ui-kit (preview)
              run: echo "Deploying react-ui-kit (preview)"
