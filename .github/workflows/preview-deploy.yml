name: Preview Deploy

on:
    workflow_dispatch:
    pull_request:
        types: [opened, synchronize, reopened, ready_for_review]

jobs:
    detect:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        outputs:
            affected: ${{ steps.affected.outputs.apps }}
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # pin@v4.3.1
              with:
                  filter: blob:none
                  fetch-depth: 0

            - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # pin@v4.0.6

            - uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # pin@v4.0.2
              with:
                  node-version: '20'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Detect affected apps
              id: affected
              shell: bash
              env:
                  EVENT_NAME: ${{ github.event_name }}
                  BASE_SHA: ${{ github.event.pull_request.base.sha }}
              run: |
                  if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
                      echo "Manual trigger — marking all apps as affected."
                      echo 'apps=["iotalabs","iota-network","iota-foundation","react-ui-kit"]' >> $GITHUB_OUTPUT
                      exit 0
                  fi

                  if [ -z "${BASE_SHA}" ]; then
                      echo "BASE_SHA is empty — marking all apps as affected."
                      echo 'apps=["iotalabs","iota-network","iota-foundation","react-ui-kit"]' >> $GITHUB_OUTPUT
                      exit 0
                  fi

                  echo "Comparing against base: ${BASE_SHA}"

                  apps=()
                  for pkg in iotalabs iota-network iota-foundation react-ui-kit; do
                      raw=$(pnpm exec turbo query affected --packages "${pkg}" --base "${BASE_SHA}")
                      count=$(echo "$raw" | jq '.data.affectedPackages.length')
                      echo "${pkg}: ${count} affected packages"
                      if [ "$count" -gt 0 ]; then
                          apps+=("\"${pkg}\"")
                      fi
                  done

                  echo "apps=[$(IFS=,; echo "${apps[*]}")]" >> $GITHUB_OUTPUT

    deploy:
        needs: detect
        if: needs.detect.outputs.affected != '[]'
        runs-on: ubuntu-latest
        strategy:
            matrix:
                app: ${{ fromJSON(needs.detect.outputs.affected) }}
        steps:
            - name: Deploy ${{ matrix.app }}
              run: echo "Deploying ${{ matrix.app }} (preview)"
