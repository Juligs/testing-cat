name: Preview Deploy

on:
    workflow_dispatch:
    pull_request:
        types: [opened, synchronize, reopened, ready_for_review]

jobs:
    detect-iotalabs:
        runs-on: ubuntu-latest
        outputs:
            affected: ${{ steps.detect.outputs.affected }}
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # pin@v4.3.1
              with:
                  fetch-depth: 0
            - name: Detect changes
              id: detect
              uses: ./.github/actions/detect-changes
              with:
                  package: iotalabs

    detect-iota-network:
        runs-on: ubuntu-latest
        outputs:
            affected: ${{ steps.detect.outputs.affected }}
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # pin@v4.3.1
              with:
                  fetch-depth: 0
            - name: Detect changes
              id: detect
              uses: ./.github/actions/detect-changes
              with:
                  package: iota-network

    detect-iota-foundation:
        runs-on: ubuntu-latest
        outputs:
            affected: ${{ steps.detect.outputs.affected }}
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # pin@v4.3.1
              with:
                  fetch-depth: 0
            - name: Detect changes
              id: detect
              uses: ./.github/actions/detect-changes
              with:
                  package: iota-foundation

    detect-react-ui-kit:
        runs-on: ubuntu-latest
        outputs:
            affected: ${{ steps.detect.outputs.affected }}
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # pin@v4.3.1
              with:
                  fetch-depth: 0
            - name: Detect changes
              id: detect
              uses: ./.github/actions/detect-changes
              with:
                  package: react-ui-kit

    iotalabs:
        needs: [detect-iotalabs]
        if: needs.detect-iotalabs.outputs.affected == 'true'
        uses: ./.github/workflows/monorepo-app-vercel-deploy.yml
        with:
            PRODUCTION: false
            APP_NAME: IOTALABS
        secrets:
            VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
            VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
            VERCEL_PROJECT_ID: ${{ secrets.IOTALABS_VERCEL_PROJECT_ID }}
            VERCEL_SCOPE: ${{ secrets.VERCEL_SCOPE }}

    iota-network:
        needs: [detect-iota-network]
        if: needs.detect-iota-network.outputs.affected == 'true'
        uses: ./.github/workflows/monorepo-app-vercel-deploy.yml
        with:
            PRODUCTION: false
            APP_NAME: IOTA Network
        secrets:
            VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
            VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
            VERCEL_PROJECT_ID: ${{ secrets.IOTA_NETWORK_VERCEL_PROJECT_ID }}
            VERCEL_SCOPE: ${{ secrets.VERCEL_SCOPE }}

    iota-foundation:
        needs: [detect-iota-foundation]
        if: needs.detect-iota-foundation.outputs.affected == 'true'
        uses: ./.github/workflows/monorepo-app-vercel-deploy.yml
        with:
            PRODUCTION: false
            APP_NAME: IOTA Foundation
        secrets:
            VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
            VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
            VERCEL_PROJECT_ID: ${{ secrets.IOTA_FOUNDATION_VERCEL_PROJECT_ID }}
            VERCEL_SCOPE: ${{ secrets.VERCEL_SCOPE }}

    react-ui-kit:
        needs: [detect-react-ui-kit]
        if: needs.detect-react-ui-kit.outputs.affected == 'true'
        uses: ./.github/workflows/monorepo-app-vercel-deploy.yml
        with:
            PRODUCTION: false
            APP_NAME: React UI-Kit Storybook
        secrets:
            VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
            VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
            VERCEL_PROJECT_ID: ${{ secrets.REACT_UI_KIT_VERCEL_PROJECT_ID }}
            VERCEL_SCOPE: ${{ secrets.VERCEL_SCOPE }}
