name: Preview Deploy

on:
    workflow_dispatch:
        inputs:
            app:
                description: 'App to deploy'
                required: true
                default: all
                type: choice
                options:
                    - all
                    - iotalabs
                    - iota-network
                    - iota-foundation
                    - react-ui-kit
    pull_request:
        types: [opened, synchronize, reopened, ready_for_review]

jobs:
    detect:
        uses: ./.github/workflows/detect-affected-apps.yml
        with:
            base: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || '' }}
            fetch_ref: ${{ github.event_name == 'pull_request' && github.base_ref || '' }}
            dispatch_app: ${{ inputs.app || '' }}

    deploy-iotalabs:
        needs: detect
        if: contains(fromJSON(needs.detect.outputs.affected), 'iotalabs')
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
            deployments: write
        concurrency:
            group: ${{ github.workflow }}-iotalabs-${{ github.event.number || github.ref }}
            cancel-in-progress: true
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # pin@v4.3.1
            - uses: ./.github/actions/monorepo-app-vercel-deploy
              with:
                  production: 'false'
                  app_name: iotalabs
                  vercel_token: ${{ secrets.VERCEL_TOKEN }}
                  vercel_org_id: ${{ secrets.VERCEL_ORG_ID }}
                  vercel_project_id: ${{ secrets.IOTALABS_VERCEL_PROJECT_ID }}
                  vercel_scope: ${{ secrets.VERCEL_SCOPE }}

    deploy-iota-network:
        needs: detect
        if: contains(fromJSON(needs.detect.outputs.affected), 'iota-network')
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
            deployments: write
        concurrency:
            group: ${{ github.workflow }}-iota-network-${{ github.event.number || github.ref }}
            cancel-in-progress: true
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # pin@v4.3.1
            - uses: ./.github/actions/monorepo-app-vercel-deploy
              with:
                  production: 'false'
                  app_name: iota-network
                  vercel_token: ${{ secrets.VERCEL_TOKEN }}
                  vercel_org_id: ${{ secrets.VERCEL_ORG_ID }}
                  vercel_project_id: ${{ secrets.IOTA_NETWORK_VERCEL_PROJECT_ID }}
                  vercel_scope: ${{ secrets.VERCEL_SCOPE }}

    deploy-iota-foundation:
        needs: detect
        if: contains(fromJSON(needs.detect.outputs.affected), 'iota-foundation')
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
            deployments: write
        concurrency:
            group: ${{ github.workflow }}-iota-foundation-${{ github.event.number || github.ref }}
            cancel-in-progress: true
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # pin@v4.3.1
            - uses: ./.github/actions/monorepo-app-vercel-deploy
              with:
                  production: 'false'
                  app_name: iota-foundation
                  vercel_token: ${{ secrets.VERCEL_TOKEN }}
                  vercel_org_id: ${{ secrets.VERCEL_ORG_ID }}
                  vercel_project_id: ${{ secrets.IOTA_FOUNDATION_VERCEL_PROJECT_ID }}
                  vercel_scope: ${{ secrets.VERCEL_SCOPE }}

    deploy-react-ui-kit:
        needs: detect
        if: contains(fromJSON(needs.detect.outputs.affected), 'react-ui-kit')
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
            deployments: write
        concurrency:
            group: ${{ github.workflow }}-react-ui-kit-${{ github.event.number || github.ref }}
            cancel-in-progress: true
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # pin@v4.3.1
            - uses: ./.github/actions/monorepo-app-vercel-deploy
              with:
                  production: 'false'
                  app_name: react-ui-kit
                  vercel_token: ${{ secrets.VERCEL_TOKEN }}
                  vercel_org_id: ${{ secrets.VERCEL_ORG_ID }}
                  vercel_project_id: ${{ secrets.REACT_UI_KIT_VERCEL_PROJECT_ID }}
                  vercel_scope: ${{ secrets.VERCEL_SCOPE }}
