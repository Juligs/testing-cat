name: Preview Deploy

on:
    workflow_dispatch:
        inputs:
            app:
                description: 'App to deploy'
                required: true
                default: all
                type: choice
                options:
                    - all
                    - iotalabs
                    - iota-network
                    - iota-foundation
                    - react-ui-kit
    pull_request:
        types: [opened, synchronize, reopened, ready_for_review]

jobs:
    detect:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        outputs:
            affected: ${{ steps.affected.outputs.apps }}
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # pin@v4.3.1
              with:
                  filter: blob:none
                  fetch-depth: 0

            - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # pin@v4.0.6

            - uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # pin@v4.0.2
              with:
                  node-version: '20'
                  cache: 'pnpm'

            - name: Detect affected apps
              id: affected
              shell: bash
              env:
                  EVENT_NAME: ${{ github.event_name }}
                  BASE_SHA: ${{ github.event.pull_request.base.sha }}
                  DISPATCH_APP: ${{ inputs.app }}
              run: |
                  if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
                      if [ "${DISPATCH_APP}" = "all" ]; then
                          echo "Manual trigger — all apps selected."
                          echo 'apps=["iotalabs","iota-network","iota-foundation","react-ui-kit"]' >> $GITHUB_OUTPUT
                      else
                          echo "Manual trigger — selected app: ${DISPATCH_APP}"
                          echo "apps=[\"${DISPATCH_APP}\"]" >> $GITHUB_OUTPUT
                      fi
                      exit 0
                  fi

                  if [ -z "${BASE_SHA}" ]; then
                      echo "BASE_SHA is empty — marking all apps as affected."
                      echo 'apps=["iotalabs","iota-network","iota-foundation","react-ui-kit"]' >> $GITHUB_OUTPUT
                      exit 0
                  fi

                  echo "Comparing against base: ${BASE_SHA}"

                  apps=()
                  for pkg in iotalabs iota-network iota-foundation react-ui-kit; do
                      raw=$(pnpm dlx turbo@2.9.6 query affected --packages "${pkg}" --base "${BASE_SHA}")
                      count=$(echo "$raw" | jq '.data.affectedPackages.length')
                      echo "${pkg}: ${count} affected packages"
                      if [ "$count" -gt 0 ]; then
                          apps+=("\"${pkg}\"")
                      fi
                  done

                  echo "apps=[$(IFS=,; echo "${apps[*]}")]" >> $GITHUB_OUTPUT

    deploy-iotalabs:
        name: Preview Deploy / IOTALABS
        needs: detect
        if: contains(fromJSON(needs.detect.outputs.affected), 'iotalabs')
        uses: ./.github/workflows/monorepo-app-vercel-deploy.yml
        with:
            APP_ID: iotalabs
            PRODUCTION: false
        secrets: inherit

    deploy-iota-network:
        name: Preview Deploy / IOTA Network
        needs: detect
        if: contains(fromJSON(needs.detect.outputs.affected), 'iota-network')
        uses: ./.github/workflows/monorepo-app-vercel-deploy.yml
        with:
            APP_ID: iota-network
            PRODUCTION: false
        secrets: inherit

    deploy-iota-foundation:
        name: Preview Deploy / IOTA Foundation
        needs: detect
        if: contains(fromJSON(needs.detect.outputs.affected), 'iota-foundation')
        uses: ./.github/workflows/monorepo-app-vercel-deploy.yml
        with:
            APP_ID: iota-foundation
            PRODUCTION: false
        secrets: inherit

    deploy-react-ui-kit:
        name: Preview Deploy / React UI Kit
        needs: detect
        if: contains(fromJSON(needs.detect.outputs.affected), 'react-ui-kit')
        uses: ./.github/workflows/monorepo-app-vercel-deploy.yml
        with:
            APP_ID: react-ui-kit
            PRODUCTION: false
        secrets: inherit
