name: Preview Deploy for the IOTALABS website

on:
    workflow_dispatch:
    pull_request:
        types: [opened, synchronize, reopened, ready_for_review]
        paths:
            - 'apps/iotalabs/**'
            - 'ui-kit/react/**'
            - '.github/workflows/iotalabs.preview-deploy.yml'
            - '.github/workflows/monorepo-app-vercel-deploy.yml'

jobs:
    deploy-preview:
        uses: ./.github/workflows/monorepo-app-vercel-deploy.yml
        with:
            PRODUCTION: false
        secrets:
            VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
            VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
            VERCEL_PROJECT_ID: ${{ secrets.IOTALABS_VERCEL_PROJECT_ID }}
            VERCEL_SCOPE: ${{ secrets.VERCEL_SCOPE }}
